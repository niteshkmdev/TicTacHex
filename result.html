<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex Tic Tac Toe - Result</title>
    <meta name="theme-color" content="#111" />
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at 10% 20%, rgb(30, 0, 30) 0%, rgb(17, 17, 17) 90.2%);
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Ambient Hexagons Background Overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5" fill="none" stroke="%23E94057" stroke-width="2"/></svg>');
            background-size: 100px 100px;
            z-index: -1;
        }

        .glass-container {
            background: rgba(20, 20, 20, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: normal;
            color: #aaa;
            margin-bottom: 30px;
        }

        button {
            background: #1f2937;
            color: #fff;
            border: 1px solid #374151;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #E94057;
            border-color: #F27121;
        }

        .winner-X {
            color: #E94057;
        }

        .winner-O {
            color: #D946EF;
        }
    </style>
</head>

<body>
    <div class="glass-container">
        <div id="result-content">
            <h1 id="winner-title">Game Over</h1>
            <h2 id="reason-desc"></h2>
        </div>
        <button onclick="location.href='index.html'">Back to Main Menu</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const winner = params.get('winner');
        const reason = params.get('reason');

        const titleEl = document.getElementById('winner-title');
        const reasonEl = document.getElementById('reason-desc');

        if (winner) {
            titleEl.innerHTML = `Player <span class="winner-${winner}">${winner}</span> Wins!`;
        }

        if (reason === 'disconnect') {
            reasonEl.textContent = "The other player disconnected. You win automatically!";
        } else if (reason === 'error') {
            reasonEl.textContent = "A connection error occurred.";
        } else {
            reasonEl.textContent = "Great moves!";
        }
    </script>
</body>

</html>
