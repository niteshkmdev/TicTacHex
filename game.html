    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        body {
            --before-display: block;
            margin: 0;
            background: radial-gradient(circle at 10% 20%, rgb(30, 0, 30) 0%, rgb(17, 17, 17) 90.2%);
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        body::before {
            display: var(--before-display);
            content: '';
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5" fill="none" stroke="%23E94057" stroke-width="2"/></svg>');
            background-size: 100px 100px;
            z-index: -1;
        }



        /* Lobby Styles */
        .lobby-card {
            background: rgba(20, 20, 20, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-align: center;
            z-index: 100;
        }



        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .link-box {
            display: flex;
            margin-top: 15px;
            margin-bottom: 25px;
        }

        .link-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #374151;
            background: #111;
            color: #aaa;
            border-radius: 6px 0 0 6px;
            font-size: 14px;
        }

        .link-box button {
            background: #8A2387;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            font-weight: bold;
        }

        .link-box button:hover {
            background: #E94057;
        }

        .players {
            text-align: left;
            background: #111;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .player {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .player:last-child {
            margin-bottom: 0;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #444;
            margin-right: 10px;
        }

        .status-dot.active {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }

        .action-btn {
            background: #E94057;
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            font-weight: bold;
        }

        .action-btn:hover:not(:disabled) {
            background: #F27121;
        }

        .action-btn:disabled {
            background: #374151;
            color: #888;
            cursor: not-allowed;
        }

        .btn-quit {
            background: transparent;
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
            margin-top: 15px;
            border-radius: 8px;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-quit:hover {
            background: rgba(255, 77, 77, 0.1);
        }

        #status-msg {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
            min-height: 20px;
        }

        /* Game Styles */
        #game-container {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            touch-action: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            background: #111;
            padding: 8px 10px;
            border-radius: 6px;
            z-index: 10;
        }

        #restart-container {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 10;
        }

        #restart {
            background: #1f2937;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        #mobileHelp {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            opacity: .8;
            z-index: 10;
            white-space: nowrap;
        }

        .btn-back {
            background: #E94057;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            margin-right: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>

    <!-- LOBBY SCREEN -->
    <div id="lobby-screen" class="lobby-card">
        <div class="bg"></div>
        <h1 id="lobby-title">Room</h1>

        <div id="host-controls" style="display: none;">
            <p style="margin: 0; color: #bbb; text-align: left; font-size: 14px;">Invite Link:</p>
            <div class="link-box">
                <input type="text" id="invite-link" readonly>
                <button onclick="copyLink()" id="copy-btn">Copy</button>
            </div>
        </div>

        <div class="players">
            <div class="player">
                <div class="status-dot active"></div>
                <span id="p1-name">Player 1</span>
            </div>
            <div class="player">
                <div class="status-dot" id="p2-dot"></div>
                <span id="p2-name" style="color: #888;">Waiting for player...</span>
            </div>
        </div>

        <button id="start-btn" class="action-btn" disabled>Start Game</button>
        <button class="btn-quit" onclick="leaveLobby()">Leave Room</button>
        <div id="status-msg">Connecting...</div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-container">
        <div id="ui">Turn: <span id="turn">X</span></div>
        <div id="restart-container">
            <button class="btn-back" onclick="leaveGame()">Quit</button>
            <button id="restart">New Game</button>
        </div>
        <div id="mobileHelp">Tap: place • Drag: move • Pinch: zoom</div>
        <canvas id="c"></canvas>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'local';
        const roomToJoin = urlParams.get('room');

        const lobbyScreen = document.getElementById('lobby-screen');
        const gameContainer = document.getElementById('game-container');

        // Canvas
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");

        /* GAME STATE */
        let board = new Map();
        let turn = "X";
        let gameOver = false;
        let winLine = null;

        /* VIEW STATE */
        let size = 32;
        let offsetX = 0;
        let offsetY = 0;

        /* INPUT STATE */
        let moved = false;
        let lastTouch = null;
        let pinchDist = null;

        /* MULTIPLAYER STATE */
        let isMultiplayer = mode === 'host' || mode === 'join';
        let myPlayer = null;
        let peer = null;
        let conn = null;

        // Lobby DOM
        const statusMsg = document.getElementById('status-msg');
        const p2Dot = document.getElementById('p2-dot');
        const p2Name = document.getElementById('p2-name');
        const startBtn = document.getElementById('start-btn');
        const titleEl = document.getElementById('lobby-title');
        const hostControls = document.getElementById('host-controls');

        if (mode === 'local') {
            lobbyScreen.style.display = 'none';
            gameContainer.style.display = 'block';
            const body = document.querySelector('body');
            body.style.setProperty('--before-display', 'none')
            updateTurnDisplay();
            resize();
            draw();
        } else {
            // Multiplayer logic
            peer = new Peer();

            peer.on('error', (err) => {
                console.error(err);
                statusMsg.textContent = "Error: " + err.type;
                statusMsg.style.color = "#ff4d4d";
            });

            if (mode === 'host') {
                myPlayer = 'X';
                titleEl.textContent = "Game Lobby";
                document.getElementById('p1-name').textContent = "Host (X) - You";
                document.getElementById('restart').style.display = 'none'; // No local restart for MP

                peer.on('open', (id) => {
                    statusMsg.textContent = "Room created. Waiting for player...";
                    hostControls.style.display = 'block';

                    let basePath = window.location.origin + window.location.pathname.replace('game.html', 'index.html');
                    if (window.location.protocol === 'file:') basePath = window.location.href.replace('game.html', 'index.html');

                    const joinUrl = basePath.split('?')[0] + '?mode=join&room=' + id;
                    document.getElementById('invite-link').value = joinUrl;
                });

                peer.on('connection', (c) => {
                    if (conn && conn.peer !== c.peer) {
                        setTimeout(() => { c.send({ type: 'error', msg: 'Room is full' }); c.close(); }, 500);
                        return;
                    }
                    conn = c;
                    setupConnection();

                    statusMsg.textContent = "Player joined!";
                    statusMsg.style.color = "#22c55e";
                    p2Dot.classList.add('active');
                    p2Name.textContent = "Player 2 (O)";
                    p2Name.style.color = "#fff";
                    startBtn.disabled = false;
                });

                startBtn.onclick = () => {
                    if (conn && conn.open) {
                        conn.send({ type: 'start' });
                        startGame();
                    }
                };

            } else if (mode === 'join') {
                myPlayer = 'O';
                titleEl.textContent = "Joining Room...";
                document.getElementById('p1-name').textContent = "Host (X)";
                p2Name.textContent = "Player 2 (O) - You";
                hostControls.style.display = 'none';
                startBtn.style.display = 'none';
                document.getElementById('restart').style.display = 'none';

                peer.on('open', () => {
                    statusMsg.textContent = "Connecting to host...";
                    conn = peer.connect(roomToJoin);
                    setupConnection();
                });
            }
        }

        function setupConnection() {
            conn.on('open', () => {
                if (mode === 'join') {
                    statusMsg.textContent = "Connected! Waiting for host to start...";
                    statusMsg.style.color = "#22c55e";
                    p2Dot.classList.add('active');
                    p2Name.style.color = "#fff";
                    document.getElementById('p1-name').textContent = "Host (X)";
                }
            });

            conn.on('data', (data) => {
                if (data.type === 'start' && mode === 'join') {
                    startGame();
                } else if (data.type === 'error') {
                    statusMsg.textContent = data.msg;
                    statusMsg.style.color = "#ff4d4d";
                    conn.close();
                } else if (data.type === 'move') {
                    applyMoveEx(data.q, data.r, data.player);
                    if (!isHexVisible(data.q, data.r)) {
                        focusOnHex(data.q, data.r);
                    }
                }
            });

            conn.on('close', handleDisconnect);
            peer.on('disconnected', handleDisconnect);
        }

        function handleDisconnect() {
            if (gameOver) return;
            if (lobbyScreen.style.display !== 'none') {
                if (mode === 'host') {
                    statusMsg.textContent = "Player left the lobby.";
                    statusMsg.style.color = "#ff4d4d";
                    p2Dot.classList.remove('active');
                    p2Name.textContent = "Waiting for player...";
                    p2Name.style.color = "#888";
                    startBtn.disabled = true;
                    conn = null;
                } else {
                    statusMsg.textContent = "Host left the lobby. Room destroyed.";
                    statusMsg.style.color = "#ff4d4d";
                    p2Dot.classList.remove('active');
                    document.getElementById('p1-name').style.color = "#888";
                    document.getElementById('p1-name').textContent = "Host Disconnected";
                    conn = null;
                }
            } else {
                window.location.href = `result.html?winner=${myPlayer}&reason=disconnect`;
            }
        }

        function copyLink() {
            const link = document.getElementById('invite-link');
            link.select();
            document.execCommand('copy');
            const btn = document.getElementById('copy-btn');
            btn.textContent = 'Copied!';
            btn.style.background = '#F27121';
            setTimeout(() => {
                btn.textContent = 'Copy';
                btn.style.background = '#8A2387';
            }, 2000);
        }

        function leaveLobby() {
            if (conn) conn.close();
            if (peer) peer.destroy();
            window.location.href = 'index.html';
        }

        function leaveGame() {
            if (conn) conn.close();
            if (peer) peer.destroy();
            window.location.href = 'index.html';
        }

        function startGame() {
            const body = document.querySelector('body');
            body.style.setProperty('--before-display', 'none')
            lobbyScreen.style.display = 'none';
            gameContainer.style.display = 'block';
            updateTurnDisplay();
            resize();
            draw();
        }

        function resize() {
            if (gameContainer.style.display === 'none') return;
            canvas.width = window.innerWidth
            canvas.height = window.innerHeight
            offsetX = canvas.width / 2
            offsetY = canvas.height / 2
            draw()
        }

        window.addEventListener("resize", resize)

        function key(q, r) { return q + "," + r }

        function hexToPixel(q, r) {
            const x = size * Math.sqrt(3) * (q + r / 2) + offsetX
            const y = size * 1.5 * r + offsetY
            return [x, y]
        }

        function pixelToHex(x, y) {
            x -= offsetX
            y -= offsetY
            const q = (Math.sqrt(3) / 3 * x - 1 / 3 * y) / size
            const r = (2 / 3 * y) / size
            return hexRound(q, r)
        }

        function hexRound(q, r) {
            let s = -q - r
            let rq = Math.round(q)
            let rr = Math.round(r)
            let rs = Math.round(s)
            const qd = Math.abs(rq - q)
            const rd = Math.abs(rr - r)
            const sd = Math.abs(rs - s)
            if (qd > rd && qd > sd) rq = -rr - rs
            else if (rd > sd) rr = -rq - rs
            return [rq, rr]
        }

        function isHexVisible(q, r) {
            const [x, y] = hexToPixel(q, r);
            const margin = size * 2;
            return x >= margin && x <= canvas.width - margin && y >= margin && y <= canvas.height - margin;
        }

        let focusAnimFrame = null;
        function focusOnHex(q, r) {
            const boardX = size * Math.sqrt(3) * (q + r / 2);
            const boardY = size * 1.5 * r;
            const targetOffsetX = canvas.width / 2 - boardX;
            const targetOffsetY = canvas.height / 2 - boardY;

            const duration = 400;
            const startX = offsetX;
            const startY = offsetY;
            const startTime = performance.now();

            if (focusAnimFrame) cancelAnimationFrame(focusAnimFrame);

            function animate(now) {
                const elapsed = now - startTime;
                const t = Math.min(elapsed / duration, 1);
                const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

                offsetX = startX + (targetOffsetX - startX) * ease;
                offsetY = startY + (targetOffsetY - startY) * ease;
                draw();

                if (t < 1) {
                    focusAnimFrame = requestAnimationFrame(animate);
                } else {
                    focusAnimFrame = null;
                }
            }
            focusAnimFrame = requestAnimationFrame(animate);
        }

        function drawHex(x, y) {
            ctx.beginPath()
            for (let i = 0; i < 6; i++) {
                const a = Math.PI / 180 * (60 * i + 30)
                const px = x + size * Math.cos(a)
                const py = y + size * Math.sin(a)
                if (i === 0) ctx.moveTo(px, py)
                else ctx.lineTo(px, py)
            }
            ctx.closePath()
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, 'rgba(138, 35, 135, 0.4)');
            grad.addColorStop(0.5, 'rgba(233, 64, 87, 0.4)');
            grad.addColorStop(1, 'rgba(242, 113, 33, 0.4)');
            ctx.strokeStyle = grad;
            ctx.stroke()
        }

        function drawPiece(x, y, v) {
            const color = v === 'X' ? '#E94057' : '#D946EF';
            ctx.fillStyle = color;
            ctx.shadowBlur = 8;
            ctx.shadowColor = color;
            ctx.font = `bold ${size}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(v, x, y + 1);
            ctx.shadowBlur = 0;
        }

        function draw() {
            if (gameContainer.style.display === 'none') return;
            ctx.clearRect(0, 0, canvas.width, canvas.height)
            const range = 15
            for (let q = -range; q < range; q++) {
                for (let r = -range; r < range; r++) {
                    const [x, y] = hexToPixel(q, r)
                    drawHex(x, y)
                    const v = board.get(key(q, r))
                    if (v) drawPiece(x, y, v)
                }
            }
            if (winLine) {
                const s = hexToPixel(winLine[0][0], winLine[0][1])
                const e = hexToPixel(winLine[1][0], winLine[1][1])
                ctx.strokeStyle = "#22c55e"
                ctx.lineWidth = 5
                ctx.beginPath()
                ctx.moveTo(s[0], s[1])
                ctx.lineTo(e[0], e[1])
                ctx.stroke()
                ctx.lineWidth = 1
            }
        }

        const dirs = [
            [1, 0], [0, 1], [-1, 1],
            [-1, 0], [0, -1], [1, -1]
        ]

        function checkWin(q, r) {
            const p = board.get(key(q, r))
            for (let i = 0; i < 3; i++) {
                const d1 = dirs[i]
                const d2 = dirs[i + 3]
                const cells = [[q, r]]
                for (let k = 1; k < 6; k++) {
                    const nq = q + d1[0] * k
                    const nr = r + d1[1] * k
                    if (board.get(key(nq, nr)) === p) cells.push([nq, nr])
                    else break
                }
                for (let k = 1; k < 6; k++) {
                    const nq = q + d2[0] * k
                    const nr = r + d2[1] * k
                    if (board.get(key(nq, nr)) === p) cells.unshift([nq, nr])
                    else break
                }
                if (cells.length >= 6) {
                    winLine = [cells[0], cells[cells.length - 1]]
                    return true
                }
            }
            return false
        }

        function applyMoveEx(q, r, player) {
            const k = key(q, r);
            board.set(k, player);

            if (checkWin(q, r)) {
                gameOver = true;
                draw();
                setTimeout(() => {
                    window.location.href = `result.html?winner=${player}&reason=win`;
                }, 1500);
            } else {
                turn = turn === 'X' ? 'O' : 'X';
                updateTurnDisplay();
                draw();
            }
        }

        function updateTurnDisplay() {
            const turnSpan = document.getElementById("turn");
            if (isMultiplayer) {
                if (turn === myPlayer) {
                    turnSpan.innerHTML = `<b>${turn} (Your Turn)</b>`;
                    turnSpan.style.color = '#22c55e';
                } else {
                    turnSpan.textContent = `${turn} (Waiting...)`;
                    turnSpan.style.color = '#fff';
                }
            } else {
                turnSpan.textContent = turn;
                turnSpan.style.color = '#fff';
            }
        }

        canvas.addEventListener("click", e => {
            if (gameContainer.style.display === 'none') return;
            if (gameOver || moved) {
                moved = false
                return
            }

            if (isMultiplayer) {
                if (turn !== myPlayer) return;
                if (!conn || !conn.open) return;
            }

            const rect = canvas.getBoundingClientRect()
            const x = e.clientX - rect.left
            const y = e.clientY - rect.top
            const [q, r] = pixelToHex(x, y)
            const k = key(q, r)

            if (board.has(k)) return

            if (isMultiplayer && conn && conn.open) {
                conn.send({ type: 'move', q: q, r: r, player: turn });
            }

            applyMoveEx(q, r, turn);
        })

        canvas.addEventListener("mousemove", e => {
            if (gameContainer.style.display === 'none') return;
            if (!e.ctrlKey) return
            if (focusAnimFrame) cancelAnimationFrame(focusAnimFrame);
            moved = true
            offsetX += e.movementX
            offsetY += e.movementY
            canvas.style.cursor = "grabbing"
            draw()
        })

        window.addEventListener("keyup", () => canvas.style.cursor = "default")

        canvas.addEventListener("wheel", e => {
            if (gameContainer.style.display === 'none') return;
            if (focusAnimFrame) cancelAnimationFrame(focusAnimFrame);
            size += e.deltaY * -0.01
            size = Math.max(10, Math.min(80, size))
            draw()
        })

        canvas.addEventListener("touchstart", e => {
            if (gameContainer.style.display === 'none') return;
            if (e.touches.length === 1) {
                lastTouch = e.touches[0]
                if (focusAnimFrame) cancelAnimationFrame(focusAnimFrame);
            }
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX
                const dy = e.touches[0].clientY - e.touches[1].clientY
                pinchDist = Math.hypot(dx, dy)
            }
        })

        canvas.addEventListener("touchmove", e => {
            if (gameContainer.style.display === 'none') return;
            e.preventDefault()
            if (e.touches.length === 1) {
                const t = e.touches[0]
                offsetX += t.clientX - lastTouch.clientX
                offsetY += t.clientY - lastTouch.clientY
                lastTouch = t
                moved = true
                draw()
            }
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX
                const dy = e.touches[0].clientY - e.touches[1].clientY
                const d = Math.hypot(dx, dy)
                size += (d - pinchDist) * 0.02
                size = Math.max(10, Math.min(80, size))
                pinchDist = d
                draw()
            }
        }, { passive: false })

        canvas.addEventListener("touchend", e => {
            if (gameContainer.style.display === 'none') return;
            if (moved) {
                moved = false
                return
            }

            if (isMultiplayer) {
                if (turn !== myPlayer) return;
                if (!conn || !conn.open) return;
            }

            const t = e.changedTouches[0]
            const rect = canvas.getBoundingClientRect()
            const x = t.clientX - rect.left
            const y = t.clientY - rect.top
            const [q, r] = pixelToHex(x, y)
            const k = key(q, r)

            if (board.has(k) || gameOver) return

            if (isMultiplayer && conn && conn.open) {
                conn.send({ type: 'move', q: q, r: r, player: turn });
            }

            applyMoveEx(q, r, turn);
        })

        function reset() {
            if (isMultiplayer) return;

            board.clear()
            turn = "X"
            gameOver = false
            winLine = null
            updateTurnDisplay()
            resize()
        }

        document.getElementById("restart").onclick = reset
    </script>

</body>

</html>
