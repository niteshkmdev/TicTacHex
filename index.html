<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Hex Tic Tac Toe</title>
<style>
body{margin:0;background:#0b0f14;color:#fff;font-family:sans-serif;overflow:hidden}
canvas{display:block}
#ui{position:fixed;top:10px;left:10px;background:#111;padding:8px 10px;border-radius:6px}
#restart{position:fixed;top:10px;right:10px;background:#1f2937;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer}
#restart:hover{background:#374151}
</style>
</head>
<body>
<div id="ui">Turn: <span id="turn">X</span></div>
<button id="restart">New Game</button>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let size=30;
let offsetX=canvas.width/2;
let offsetY=canvas.height/2;

let board=new Map();
let turn='X';
let gameOver=false;
let winLine=null; // [[q,r],[q,r]]
let moved=false;

window.addEventListener('keydown',e=>{
 if(e.ctrlKey) canvas.style.cursor='grabbing';
});

window.addEventListener('keyup',e=>{
 if(!e.ctrlKey) canvas.style.cursor='default';
});

function key(q,r){return q+','+r}

function drawHex(x,y){
ctx.beginPath();
for(let i=0;i<6;i++){
let angle=Math.PI/180*(60*i+30);
let px=x+size*Math.cos(angle);
let py=y+size*Math.sin(angle);
if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
}
ctx.closePath();
ctx.strokeStyle='#333';
ctx.stroke();
}

function hexToPixel(q,r){
let x=size*Math.sqrt(3)*(q+r/2)+offsetX;
let y=size*1.5*r+offsetY;
return [x,y];
}

function pixelToHex(x,y){
x-=offsetX;
y-=offsetY;
let q=(Math.sqrt(3)/3*x-1/3*y)/size;
let r=(2/3*y)/size;
return hexRound(q,r);
}

function hexRound(q,r){
let s=-q-r;
let rq=Math.round(q);
let rr=Math.round(r);
let rs=Math.round(s);

let q_diff=Math.abs(rq-q);
let r_diff=Math.abs(rr-r);
let s_diff=Math.abs(rs-s);

if(q_diff>r_diff && q_diff>s_diff) rq=-rr-rs;
else if(r_diff>s_diff) rr=-rq-rs;

return [rq,rr];
}

function drawPiece(x,y,v){
ctx.fillStyle=v==='X'?'#ff4d4d':'#4da6ff';
ctx.font=`${size}px sans-serif`;
ctx.textAlign='center';
ctx.textBaseline='middle';
ctx.fillText(v,x,y+1);
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

let range=25;
for(let q=-range;q<range;q++){
for(let r=-range;r<range;r++){
let [x,y]=hexToPixel(q,r);
drawHex(x,y);
let v=board.get(key(q,r));
if(v) drawPiece(x,y,v);
}
}

if(winLine){
const start=hexToPixel(winLine[0][0],winLine[0][1]);
const end=hexToPixel(winLine[1][0],winLine[1][1]);
ctx.strokeStyle='#22c55e';
ctx.lineWidth=Math.max(4,size*0.2);
ctx.beginPath();
ctx.moveTo(start[0],start[1]);
ctx.lineTo(end[0],end[1]);
ctx.stroke();
ctx.lineWidth=1;
}
}

const dirs=[[1,0],[0,1],[-1,1],[-1,0],[0,-1],[1,-1]];

function checkWin(q,r){
let player=board.get(key(q,r));

for(let i=0;i<3;i++){
let d1=dirs[i];
let d2=dirs[i+3];

let cells=[[q,r]];

for(let k=1;k<6;k++){
let nq=q+d1[0]*k;
let nr=r+d1[1]*k;
if(board.get(key(nq,nr))===player) cells.push([nq,nr]); else break;
}

for(let k=1;k<6;k++){
let nq=q+d2[0]*k;
let nr=r+d2[1]*k;
if(board.get(key(nq,nr))===player) cells.unshift([nq,nr]); else break;
}

if(cells.length>=6){
winLine=[cells[0],cells[cells.length-1]];
return true;
}
}

return false;
}

canvas.addEventListener('click',e=>{
if(e.ctrlKey) return;
if(gameOver || moved) {
moved=false;
return;
}

let rect=canvas.getBoundingClientRect();
let x=e.clientX-rect.left;
let y=e.clientY-rect.top;

let [q,r]=pixelToHex(x,y);
let k=key(q,r);

if(board.has(k)) return;

board.set(k,turn);

if(checkWin(q,r)) gameOver=true;

turn=turn==='X'?'O':'X';
document.getElementById('turn').textContent=turn;

draw();
});

canvas.addEventListener('mousemove',e=>{
if(!e.ctrlKey) return;

moved=true;
offsetX+=e.movementX;
offsetY+=e.movementY;

draw();
});

canvas.addEventListener('wheel',e=>{
size+=e.deltaY*-0.01;
size=Math.max(10,Math.min(80,size));
draw();
});

function reset(){
board.clear();
turn='X';
gameOver=false;
winLine=null;
document.getElementById('turn').textContent=turn;
draw();
}

document.getElementById('restart').onclick=reset;

draw();
</script>
</body>
</html>
