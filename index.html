<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hex Tic Tac Toe - Menu</title>
  <style>
    body {
      margin: 0;
      background: #0b0f14;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 2rem;
      text-align: center;
    }

    .menu-options {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 300px;
    }

    button {
      background: #1f2937;
      color: #fff;
      border: 1px solid #374151;
      padding: 15px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
      box-sizing: border-box;
    }

    button:hover:not(:disabled) {
      background: #374151;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <h1>Hex Tic Tac<br>Toe</h1>
  <div class="menu-options">
    <button onclick="location.href='game.html?mode=local'">Pass N Play</button>
    <button onclick="location.href='game.html?mode=host'">Play with Friend</button>
    <button disabled>Play Online (Matchmaking)</button>
  </div>

  <script>
    // Automatically redirect if a room ID is present in the URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('mode') === 'join' && params.get('room')) {
      window.location.href = 'game.html' + window.location.search;
    }
  </script>
</body>

</html>
