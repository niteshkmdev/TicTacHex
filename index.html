<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TicTacHex - Multiplayer Hexagonal Tic Tac Toe</title>

  <meta name="theme-color" content="#111" />
  <meta name="description"
    content="Play TicTacHex - a strategic hexagonal twist on the classic Tic Tac Toe game with P2P Multiplayer built using WebRTC." />

  <meta name="keywords" content="tic tac toe, hex, hexagon, multiplayer, game, webrtc, peerjs, html5" />

  <meta name="author" content="TicTacHex" />

  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="manifest" href="manifest.json" />

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at 10% 20%, rgb(30, 0, 30) 0%, rgb(17, 17, 17) 90%);
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5" fill="none" stroke="%23E94057" stroke-width="2"/></svg>');
      background-size: 100px 100px;
      z-index: -1;
    }

    .glass-container {
      background: rgba(20, 20, 20, .08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, .2);
      padding: 40px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 2rem;
      text-align: center;
      background: linear-gradient(45deg, #8A2387, #E94057, #F27121);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .menu-options {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 300px;
    }

    button {
      background: #1f2937;
      color: #fff;
      border: 1px solid #374151;
      padding: 15px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: .2s;
    }

    button:hover {
      background: #2a3342;
      border-color: #E94057;
    }
  </style>
</head>

<body>

  <div class="glass-container">

    <h1>Hex Tic Tac<br>Toe</h1>

    <div class="menu-options">

      <button onclick="location.href='game.html?mode=local'">
        Pass N Play
      </button>

      <button onclick="location.href='game.html?mode=host'">
        Play with Friend
      </button>

      <button onclick="location.href='game.html?mode=matchmaking'">
        Play Online (Matchmaking)
      </button>

    </div>

  </div>

  <script>

    const params = new URLSearchParams(location.search)

    if (params.get("mode") === "join" && params.get("room")) {
      location.href = "game.html" + location.search
    }

  </script>

</body>

</html>
